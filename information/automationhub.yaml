apiVersion: automationhub.ansible.com/v1beta1
kind: AutomationHub
metadata:
  name: cenitex-automation-hub                 # name of the crd - supporting objects secrets, configMap, routes, pvc are prefixed with this name
  namespace: aap
spec:
  api:
    log_level: INFO
    replicas: 1
  content:
    log_level: INFO
    replicas: 0
  file_storage_access_mode: ReadWriteMany
  file_storage_size: 100Gi
  file_storage_storage_class: efs-csi
  force_drop_db: false
  gunicorn_api_workers: 2
  gunicorn_content_workers: 2
  gunicorn_timeout: 90
  haproxy_timeout: 180s
  image_pull_policy: IfNotPresent
  ingress_type: Route
  loadbalancer_port: 80
  loadbalancer_protocol: http
  nginx_client_max_body_size: 10m
  nginx_proxy_connect_timeout: 120s
  nginx_proxy_read_timeout: 120s
  nginx_proxy_send_timeout: 120s
  no_log: true
  postgres_resource_requirements:
    #limits:
    #  cpu: 1000m
    #  memory: 8Gi
    requests:
      cpu: 500m
      memory: 2Gi
  postgres_storage_class: gp3-csi
  postgres_storage_requirements:
    requests:
      storage: 8Gi                     # what is the size of the automationhub database?
  redis:
    log_level: INFO
    replicas: 1
  resource_manager:
    replicas: 1
  hostname:                            # hostname of the instance - set the same as route_host
  route_host:                          # dns hostname of the external route to connect to the application - set the same as hostname
  route_tls_termination_mechanism: Edge
  storage_type: File
  web:
    replicas: 1
  worker:
    replicas: 2
  postgres_migrant_configuration_secret: old-postgres-hub-configuration-secret
  db_fields_encryption_secret: hub-secret-key
