apiVersion: automationcontroller.ansible.com/v1beta1
kind: AutomationController
metadata:
  name: cenitex-automation-cont        # name of the crd - supporting objects secrets, configMap, routes, pvc are prefixed with this name
  namespace: aap
spec:
  admin_user: admin
  auto_upgrade: true
  create_preload_data: true
  admin_email:                         # add the email
  garbage_collect_secrets: false
  hostname:                            # hostname of the instance - set the same as route_host
  route_host:                          # dns hostname of the external route to connect to the application - set the same as hostname
  image_pull_policy: IfNotPresent
  ingress_type: Route
  ipv6_disabled: false
  loadbalancer_ip: ""
  loadbalancer_port: 80
  loadbalancer_protocol: http
  metrics_utility_cronjob_gather_schedule: '@hourly'
  metrics_utility_cronjob_report_schedule: '@monthly'
  metrics_utility_enabled: false
  metrics_utility_pvc_claim_size: 5Gi
  no_log: true
  postgres_keepalives: true
  postgres_keepalives_count: 5
  postgres_keepalives_idle: 5
  postgres_keepalives_interval: 5
  postgres_storage_class: gp3-csi
  postgres_storage_requirements:
    requests:
      storage: 350Gi                 # how big is the exising datase
  projects_persistence: false
  projects_storage_access_mode: ReadWriteMany
  projects_storage_size: 8Gi
  replicas: 1
  route_tls_termination_mechanism: Edge
  service_type: ClusterIP
  set_self_labels: true
  task_privileged: false
  old_postgres_configuration_secret: old-postgres-controller-configuration
  secret_key_secret: controller-secret-key
  #postgres_configuration_secret: <not rquired till rds database is used>
